<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Loves';
            src: url(fonts/Eternalo.ttf) format('truetype');
            font-weight: normal;
            font-style: normal;
        

            /*
               Tipos de formatos()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            -svg



            */

        }
        body {
            font-family: "Black Ops One", system-ui;
            font-weight: 250;
        }

        h1 {
        font-weight: 800;
        font-family: "Black Ops One", system-ui;
        font-style: normal
        }

        
    </style>
</head>

<body>
    <h1>Olá, mundo</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Magnam suscipit quas placeat, repellat pariatur delectus nobis, veritatis quis laboriosam rerum consectetur? Harum vel fuga delectus possimus recusandae a aut blanditiis?</p>
</body>
</html>

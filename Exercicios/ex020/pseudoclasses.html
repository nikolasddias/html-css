<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div {
            display: inline-block;
            background-color: lightgray;
            border: 1px, solid black;
            text-align: center;
            height: 200px;  /* Altura */
            width: 200px;  /* Largura */
        }

        div:hover {
            background-color: yellow;
        }

    </style>
</head>
<body>
    <div id="dv1">1</div>
    <div id="dv2">2</div>
    <div id="dv3">3</div>
</body>
</html>

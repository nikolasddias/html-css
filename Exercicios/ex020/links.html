<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

     /* SELETORES PERSONALIZADOS
          #  = id
          .  = class
          :  = pseudo-class
          :: = pseudo-elemento
          >  = children
     */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
          color: red;
          text-decoration: none;
          font-weight: bold;
        }

        a:visited {
           color: rgb(80, 51, 107);
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: blue;
        }

        .especial {
            background-color: rgb(236, 132, 132);
        }

        .especial::before {
            content:"⇒";
            margin-right: 3px;
        }

        .especial::after {
            content:" ⇐";
            margin-left: 3px;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://www.tiktok.com/@diasrib_?lang=pt-br" target="_blank">Perfil do Tiktok</a></li>
        <li><a href="https://www.youtube.com/@diasswkrp" target="_blank" class="especial">Canal do Youtube</a></li>
        <li><a href="https://www.instagram.com/nikolasdiassrib/" target="_blank">Perfil do Instagram</a></li>
    </ul>
</body>
</html>
